<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learn with Ms. Thúy - Bedroom and Bathroom Quiz</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        :root {
            --primary-pink: #FF85A1;
            --soft-pink: #FFC2D1;
            --bg-overlay: rgba(255, 255, 255, 0.92);
            --correct-color: #2ECC71;
            --wrong-color: #E74C3C;
            --dark-text: #2D3436;
        }

        * { box-sizing: border-box; font-family: 'Quicksand', sans-serif; }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: url('https://cdn.wallpapersafari.com/26/19/M26bXs.jpeg') no-repeat center center fixed;
            background-size: cover;
            color: var(--dark-text);
            overflow: hidden;
        }

        #app {
            width: 95%;
            max-width: 850px;
            background: var(--bg-overlay);
            padding: 2.5rem;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            text-align: center;
            min-height: 620px;
            display: flex;
            flex-direction: column;
            position: relative;
            border: 4px solid var(--soft-pink);
        }

        h1, h3 { color: var(--primary-pink); font-weight: 700; }

        .timer-badge {
            position: absolute;
            top: 25px;
            left: 25px;
            background: var(--primary-pink);
            color: white;
            padding: 6px 18px;
            border-radius: 25px;
            font-weight: 700;
        }

        .progress-container { margin-bottom: 25px; text-align: right; }
        .progress-bar { height: 12px; background: #f0f0f0; border-radius: 10px; overflow: hidden; border: 1px solid var(--soft-pink); }
        #progress-fill { height: 100%; background: linear-gradient(90deg, var(--soft-pink), var(--primary-pink)); width: 0%; transition: width 0.5s ease; }

        .option-item {
            padding: 15px;
            background: white;
            border: 2px solid var(--soft-pink);
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 1.1rem;
            height: 55px; /* Giữ độ cao cố định để ngang hàng */
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .correct-card { border-color: var(--correct-color) !important; background-color: #e8faf0 !important; color: var(--correct-color) !important; }
        .wrong-card { border-color: var(--wrong-color) !important; background-color: #fdf2f2 !important; color: var(--wrong-color) !important; }

        .match-column { display: flex; flex-direction: column; gap: 12px; }
        .word-card {
            height: 55px; /* Giữ độ cao cố định để ngang hàng */
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
            border: 2px solid var(--primary-pink);
            border-radius: 15px;
            cursor: move;
            font-weight: 700;
            color: var(--primary-pink);
        }

        button#next-btn, .start-btn {
            background: var(--primary-pink);
            border: none;
            padding: 14px 45px;
            border-radius: 30px;
            color: white;
            font-weight: 700;
            cursor: pointer;
            margin-top: 25px;
        }

        input[type="text"] { padding: 15px; border-radius: 15px; border: 2px solid var(--soft-pink); width: 70%; margin-bottom: 20px; text-align: center; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="app">
    <div id="timer" class="timer-badge hidden">00s</div>
    <div id="welcome-slide">
        <h1>Learn with Ms. Thúy</h1>
        <h3>Bedroom & Bathroom Quiz</h3>
        <input type="text" id="user-name" placeholder="Tên của em là...">
        <br><button class="start-btn" onclick="startQuiz()">Bắt đầu ngay</button>
    </div>

    <div id="quiz-container" class="hidden">
        <div class="progress-container">
            <span id="progress-text" style="font-weight:700; color: var(--primary-pink);">Câu 1 / 30</span>
            <div class="progress-bar"><div id="progress-fill"></div></div>
        </div>
        <div id="question-area"></div>
        <button id="next-btn" class="hidden" onclick="handleNext()">Tiếp tục</button>
    </div>

    <div id="result-slide" class="hidden">
        <h1 id="congrats-text"></h1>
        <div style="font-size: 5rem; color: var(--primary-pink); font-weight: 800;" id="score-display">0/30</div>
        <button class="start-btn" onclick="location.reload()">Làm lại bài</button>
    </div>
</div>

<audio id="sound-correct" src="https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3"></audio>
<audio id="sound-wrong" src="https://assets.mixkit.co/active_storage/sfx/2003/2003-preview.mp3"></audio>

<script>
    let currentStep = 0;
    let score = 0;
    let timerInterval;
    let timeLeft = 0;
    let sortableInstance;

    const questions = [
        { type: 'choice', q: "What do you wear to sleep?", options: ["Pyjamas", "Towel", "Shower gel", "Razor"], correct: "Pyjamas", time: 20 },
        { type: 'choice', q: "What wakes you up in the morning?", options: ["Mirror", "Alarm clock", "Basin", "Shelf"], correct: "Alarm clock", time: 20 },
        { type: 'choice', q: "Where do you hang your clothes?", options: ["Bed", "Wardrobe", "Toilet", "Dressing table"], correct: "Wardrobe", time: 20 },
        { type: 'choice', q: "I wash my hair with ____.", options: ["Soap", "Shampoo", "Toothpaste", "Comb"], correct: "Shampoo", time: 20 },
        { type: 'choice', q: "I look at my reflection in the ____.", options: ["Lamp", "Mirror", "Chest of drawers", "Towel"], correct: "Mirror", time: 20 },
        { type: 'choice', q: "I use a ____ to clean my teeth.", options: ["Hairbrush", "Toothbrush", "Razor", "Basin"], correct: "Toothbrush", time: 20 },
        { type: 'choice', q: "There is a ____ next to the bed.", options: ["Bedside table", "Shower", "Toilet", "Curtain"], correct: "Bedside table", time: 20 },
        { type: 'choice', q: "I wash my hands in the ____.", options: ["Wardrobe", "Basin", "Bed", "Chest of drawers"], correct: "Basin", time: 20 },
        { type: 'choice', q: "A ____ is used to dry your body.", options: ["Mirror", "Towel", "Shelf", "Lamp"], correct: "Towel", time: 20 },
        { type: 'choice', q: "I use a ____ to shave.", options: ["Comb", "Razor", "Brush", "Soap"], correct: "Razor", time: 20 },
        { 
            type: 'matching', time: 120,
            pairs: [
                {en: "Soap", vi: "Xà phòng"}, {en: "Shower", vi: "Vòi hoa sen"},
                {en: "Blanket", vi: "Cái chăn"}, {en: "Lamp", vi: "Đèn ngủ"},
                {en: "Comb", vi: "Cái lược"}, {en: "Shelf", vi: "Cái kệ"},
                {en: "Dressing table", vi: "Bàn trang điểm"}, {en: "Chest of drawers", vi: "Tủ ngăn kéo"},
                {en: "Shower gel", vi: "Sữa tắm"}, {en: "Toothpaste", vi: "Kem đánh răng"}
            ] 
        },
        { type: 'order', sentence: "Emma goes upstairs to her bedroom", words: ["Emma", "goes", "upstairs", "to", "her", "bedroom"], time: 40 },
        { type: 'order', sentence: "She gets undressed and gets into bed", words: ["She", "gets", "undressed", "and", "gets", "into", "bed"], time: 40 },
        { type: 'order', sentence: "She reads a book for a bit", words: ["She", "reads", "a", "book", "for", "a", "bit"], time: 40 },
        { type: 'order', sentence: "She turns off the light and falls asleep", words: ["She", "turns", "off", "the", "light", "and", "falls", "asleep"], time: 40 },
        { type: 'order', sentence: "The alarm clock rings at seven", words: ["The", "alarm", "clock", "rings", "at", "seven"], time: 40 },
        { type: 'order', sentence: "She wakes up and gets up", words: ["She", "wakes", "up", "and", "gets", "up"], time: 40 },
        { type: 'order', sentence: "She has a shower and cleans her teeth", words: ["She", "has", "a", "shower", "and", "cleans", "her", "teeth"], time: 40 },
        { type: 'order', sentence: "She gets dressed for the day", words: ["She", "gets", "dressed", "for", "the", "day"], time: 40 },
        { type: 'order', sentence: "She goes downstairs for breakfast", words: ["She", "goes", "downstairs", "for", "breakfast"], time: 40 },
        { type: 'order', sentence: "Emma goes to bed at eleven", words: ["Emma", "goes", "to", "bed", "at", "eleven"], time: 40 }
    ];

    function startTimer(seconds) {
        clearInterval(timerInterval);
        timeLeft = seconds;
        const el = document.getElementById('timer');
        el.innerText = timeLeft + "s";
        timerInterval = setInterval(() => {
            timeLeft--;
            el.innerText = timeLeft + "s";
            if (timeLeft <= 0) { clearInterval(timerInterval); handleNext(); }
        }, 1000);
    }

    function startQuiz() {
        window.uName = document.getElementById('user-name').value || "Em";
        document.getElementById('welcome-slide').classList.add('hidden');
        document.getElementById('quiz-container').classList.remove('hidden');
        document.getElementById('timer').classList.remove('hidden');
        showQuestion();
    }

    function showQuestion() {
        const data = questions[currentStep];
        const area = document.getElementById('question-area');
        const nextBtn = document.getElementById('next-btn');
        area.innerHTML = ""; nextBtn.classList.add('hidden');

        let displayNum = currentStep < 10 ? currentStep + 1 : (currentStep === 10 ? "11-20" : currentStep + 10);
        document.getElementById('progress-text').innerText = `Câu ${displayNum} / 30`;
        document.getElementById('progress-fill').style.width = `${((currentStep >= 10 ? currentStep+10 : currentStep) / 30) * 100}%`;

        startTimer(data.time);

        if (data.type === 'choice') {
            area.innerHTML = `<h3 style="margin-bottom:20px;">${data.q}</h3><div id="choice-grid" style="display:grid; grid-template-columns:1fr 1fr; gap:12px;"></div>`;
            data.options.forEach(opt => {
                const div = document.createElement('div');
                div.className = "option-item"; div.innerText = opt;
                div.onclick = () => {
                    clearInterval(timerInterval);
                    const isCorrect = (opt === data.correct);
                    if(isCorrect) score++;
                    div.classList.add(isCorrect ? 'correct-card' : 'wrong-card');
                    document.getElementById(isCorrect ? 'sound-correct' : 'sound-wrong').play();
                    document.getElementById('choice-grid').style.pointerEvents = "none";
                    nextBtn.classList.remove('hidden');
                };
                document.getElementById('choice-grid').appendChild(div);
            });
        } 
        else if (data.type === 'matching') {
            area.innerHTML = `<h3 style="margin-bottom:20px;">Kéo các từ tiếng Anh ở cột trái để nối với nghĩa đúng</h3><div style="display:grid; grid-template-columns:1fr 1fr; gap:25px;"><div id="en-list" class="match-column"></div><div id="vi-list" class="match-column"></div></div>`;
            const sEn = [...data.pairs].sort(() => Math.random() - 0.5);
            const sVi = [...data.pairs].sort(() => Math.random() - 0.5);
            
            sEn.forEach(p => document.getElementById('en-list').innerHTML += `<div class="word-card" data-en="${p.en}">${p.en}</div>`);
            sVi.forEach(p => document.getElementById('vi-list').innerHTML += `<div class="option-item" style="cursor:default" data-en-ref="${p.en}">${p.vi}</div>`);
            
            sortableInstance = new Sortable(document.getElementById('en-list'), { animation: 150 });
            nextBtn.classList.remove('hidden');
            nextBtn.onclick = () => {
                clearInterval(timerInterval);
                sortableInstance.option("disabled", true); // Khóa kéo thả khi kiểm tra
                
                let mScore = 0;
                const enCards = document.querySelectorAll('#en-list .word-card');
                const viCards = document.querySelectorAll('#vi-list .option-item');

                enCards.forEach((enCard, i) => {
                    const viCard = viCards[i];
                    if (enCard.dataset.en === viCard.dataset.enRef) {
                        enCard.classList.add('correct-card');
                        viCard.classList.add('correct-card');
                        mScore++;
                    } else {
                        enCard.classList.add('wrong-card');
                        viCard.classList.add('wrong-card');
                    }
                });

                score += mScore;
                document.getElementById(mScore >= 5 ? 'sound-correct' : 'sound-wrong').play();
                setTimeout(handleNext, 2500);
            };
        } 
        else if (data.type === 'order') {
            area.innerHTML = `<h3 style="margin-bottom:20px;">Kéo thả để sắp xếp câu đúng:</h3><div id="sort-area" style="display:flex; flex-wrap:wrap; gap:12px; justify-content:center; padding:25px; border:3px dashed var(--soft-pink); border-radius:20px; min-height:100px; background: white;"></div>`;
            [...data.words].sort(() => Math.random() - 0.5).forEach(w => document.getElementById('sort-area').innerHTML += `<div class="word-card" style="padding:0 15px;">${w}</div>`);
            new Sortable(document.getElementById('sort-area'), { animation: 150 });
            nextBtn.classList.remove('hidden');
            nextBtn.onclick = () => {
                clearInterval(timerInterval);
                const result = Array.from(document.getElementById('sort-area').children).map(c => c.innerText.trim()).join(" ");
                const isCorrect = (result === data.sentence);
                if(isCorrect) score++;
                const areaEl = document.getElementById('sort-area');
                areaEl.style.borderColor = isCorrect ? 'var(--correct-color)' : 'var(--wrong-color)';
                Array.from(areaEl.children).forEach(c => c.classList.add(isCorrect ? 'correct-card' : 'wrong-card'));
                document.getElementById(isCorrect ? 'sound-correct' : 'sound-wrong').play();
                setTimeout(handleNext, 1500);
            };
        }
    }

    function handleNext() {
        currentStep++;
        if (currentStep < questions.length) showQuestion();
        else {
            document.getElementById('quiz-container').classList.add('hidden');
            document.getElementById('timer').classList.add('hidden');
            document.getElementById('result-slide').classList.remove('hidden');
            document.getElementById('congrats-text').innerText = `Chúc mừng ${window.uName}!`;
            document.getElementById('score-display').innerText = `${score}/30`;
        }
    }
</script>
</body>
</html>
