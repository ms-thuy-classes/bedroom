<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Quiz - Time Challenge</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        :root {
            --pastel-blue: #8EC5FC;
            --pastel-purple: #E0C3FC;
            --correct-bg: #A8E6CF;
            --wrong-bg: #FFB7B2;
            --text: #4A4A4A;
        }

        * { box-sizing: border-box; font-family: 'Quicksand', sans-serif; }
        body {
            margin: 0; height: 100vh; display: flex; justify-content: center; align-items: center;
            background: linear-gradient(135deg, var(--pastel-purple) 0%, var(--pastel-blue) 100%);
            color: var(--text); overflow: hidden;
        }

        #app {
            width: 95%; max-width: 800px; background: rgba(255,255,255,0.95);
            padding: 2rem; border-radius: 24px; box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            text-align: center; min-height: 580px; display: flex; flex-direction: column;
            transition: background-color 0.5s ease; position: relative;
        }

        /* Timer Style */
        .timer-badge {
            position: absolute; top: 20px; left: 20px;
            background: #4A4A4A; color: white; padding: 5px 15px;
            border-radius: 20px; font-weight: 600; font-size: 0.9rem;
        }

        .progress-container { margin-bottom: 20px; text-align: right; margin-top: 10px; }
        .progress-bar { height: 8px; background: #eee; border-radius: 4px; overflow: hidden; }
        #progress-fill { height: 100%; background: var(--pastel-blue); width: 0%; transition: width 0.4s; }

        .match-item {
            padding: 12px; background: white; border: 1px solid #e0e0e0;
            border-radius: 10px; cursor: grab; margin-bottom: 8px; transition: 0.3s;
        }
        .word-card {
            padding: 10px 20px; background: white; border: 2px solid var(--pastel-blue);
            border-radius: 12px; cursor: move; font-weight: 600;
        }

        button {
            background: var(--pastel-blue); border: none; padding: 12px 35px;
            border-radius: 25px; color: white; font-weight: 600; cursor: pointer;
        }
        .hidden { display: none !important; }
        
        /* Feedback effects */
        .flash-correct { background-color: var(--correct-bg) !important; }
        .flash-wrong { background-color: var(--wrong-bg) !important; }
    </style>
</head>
<body>

<div id="app">
    <div id="timer" class="timer-badge hidden">00s</div>
    
    <div id="welcome-slide">
        <h1>Vocabulary Challenge</h1>
        <p>Phòng ngủ & Phòng tắm</p>
        <input type="text" id="user-name" placeholder="Nhập tên bạn..." style="padding:12px; border-radius:10px; border:1px solid #ddd; width:70%; margin-bottom:20px;">
        <br><button onclick="startQuiz()">Bắt đầu (Có tính giờ!)</button>
    </div>

    <div id="quiz-container" class="hidden">
        <div class="progress-container">
            <span id="progress-text">Câu 1 / 30</span>
            <div class="progress-bar"><div id="progress-fill"></div></div>
        </div>
        <div id="question-area"></div>
        <button id="next-btn" class="hidden" onclick="handleNext()">Tiếp tục</button>
    </div>

    <div id="result-slide" class="hidden">
        <h1 id="congrats-text"></h1>
        <div style="font-size: 4rem; color: var(--pastel-blue); font-weight: 700;" id="score-display">0/30</div>
        <button onclick="location.reload()">Làm lại</button>
    </div>
</div>

<audio id="sound-correct" src="https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3"></audio>
<audio id="sound-wrong" src="https://assets.mixkit.co/active_storage/sfx/2003/2003-preview.mp3"></audio>

<script>
    let currentStep = 0;
    let score = 0;
    let timerInterval;
    let timeLeft = 0;

    const questions = [
        // P1: 10 câu trắc nghiệm (20s/câu)
        { type: 'choice', q: "I use a ____ to wash my hair.", options: ["soap", "shampoo", "toothpaste", "razor"], correct: "shampoo", time: 20 },
        { type: 'choice', q: "The ____ tells me it's time to wake up.", options: ["mirror", "wardrobe", "alarm clock", "towel"], correct: "alarm clock", time: 20 },
        { type: 'choice', q: "I look at myself in the ____.", options: ["basin", "mirror", "shelf", "bed"], correct: "mirror", time: 20 },
        { type: 'choice', q: "I hang my clothes in the ____.", options: ["wardrobe", "shower", "sink", "lamp"], correct: "wardrobe", time: 20 },
        { type: 'choice', q: "I wear ____ to sleep at night.", options: ["towels", "razors", "pyjamas", "soaps"], correct: "pyjamas", time: 20 },
        { type: 'choice', q: "I brush my teeth with a ____.", options: ["hairbrush", "comb", "toothbrush", "razor"], correct: "toothbrush", time: 20 },
        { type: 'choice', q: "The ____ is next to the bed for my lamp.", options: ["bedside table", "shower", "toilet", "bath"], correct: "bedside table", time: 20 },
        { type: 'choice', q: "I use a ____ to dry myself after a bath.", options: ["basin", "towel", "shelf", "soap"], correct: "towel", time: 20 },
        { type: 'choice', q: "I keep my socks in the ____.", options: ["chest of drawers", "mirror", "lamp", "curtain"], correct: "chest of drawers", time: 20 },
        { type: 'choice', q: "I wash my hands in the ____.", options: ["wardrobe", "basin", "bedside lamp", "pyjamas"], correct: "basin", time: 20 },

        // P2: Nối từ (120s tổng)
        { 
            type: 'matching', time: 120,
            pairs: [
                {en: "Soap", vi: "Xà phòng"}, {en: "Razor", vi: "Dao cạo râu"},
                {en: "Mirror", vi: "Cái gương"}, {en: "Blanket", vi: "Cái chăn"},
                {en: "Lamp", vi: "Đèn ngủ"}, {en: "Towel", vi: "Khăn tắm"},
                {en: "Wardrobe", vi: "Tủ quần áo"}, {en: "Shower", vi: "Vòi hoa sen"},
                {en: "Basin", vi: "Bồn rửa mặt"}, {en: "Comb", vi: "Cái lược"}
            ] 
        },

        // P3: Sắp xếp câu (40s/câu)
        { type: 'order', sentence: "She goes upstairs to her bedroom", words: ["She", "goes", "upstairs", "to", "her", "bedroom"], time: 40 },
        { type: 'order', sentence: "She gets undressed and gets into bed", words: ["She", "gets", "undressed", "and", "gets", "into", "bed"], time: 40 },
        { type: 'order', sentence: "She reads a book for a bit", words: ["She", "reads", "a", "book", "for", "a", "bit"], time: 40 },
        { type: 'order', sentence: "Emma turns off the light", words: ["Emma", "turns", "off", "the", "light"], time: 40 },
        { type: 'order', sentence: "She falls asleep very quickly", words: ["She", "falls", "asleep", "very", "quickly"], time: 40 },
        { type: 'order', sentence: "The alarm clock rings at seven", words: ["The", "alarm", "clock", "rings", "at", "seven"], time: 40 },
        { type: 'order', sentence: "She wakes up and gets up", words: ["She", "wakes", "up", "and", "gets", "up"], time: 40 },
        { type: 'order', sentence: "Emma has a cold shower", words: ["Emma", "has", "a", "cold", "shower"], time: 40 },
        { type: 'order', sentence: "She cleans her teeth after breakfast", words: ["She", "cleans", "her", "teeth", "after", "breakfast"], time: 40 },
        { type: 'order', sentence: "She goes downstairs to the kitchen", words: ["She", "goes", "downstairs", "to", "the", "kitchen"], time: 40 }
    ];

    function startTimer(seconds) {
        clearInterval(timerInterval);
        timeLeft = seconds;
        updateTimerDisplay();
        timerInterval = setInterval(() => {
            timeLeft--;
            updateTimerDisplay();
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                handleNext(true); // Tự động chuyển khi hết giờ
            }
        }, 1000);
    }

    function updateTimerDisplay() {
        const el = document.getElementById('timer');
        el.innerText = timeLeft + "s";
        el.style.color = timeLeft < 10 ? "#ff4d4d" : "white";
    }

    function startQuiz() {
        const name = document.getElementById('user-name').value || "Bạn";
        window.userName = name;
        document.getElementById('welcome-slide').classList.add('hidden');
        document.getElementById('quiz-container').classList.remove('hidden');
        document.getElementById('timer').classList.remove('hidden');
        showQuestion();
    }

    function triggerFeedback(isCorrect) {
        const app = document.getElementById('app');
        const sound = document.getElementById(isCorrect ? 'sound-correct' : 'sound-wrong');
        app.classList.add(isCorrect ? 'flash-correct' : 'flash-wrong');
        sound.currentTime = 0;
        sound.play();
        setTimeout(() => {
            app.classList.remove('flash-correct', 'flash-wrong');
        }, 800);
    }

    function showQuestion() {
        const data = questions[currentStep];
        const area = document.getElementById('question-area');
        const nextBtn = document.getElementById('next-btn');
        nextBtn.classList.add('hidden');
        area.innerHTML = "";
        
        let displayNum = currentStep < 10 ? currentStep + 1 : (currentStep === 10 ? "11-20" : currentStep + 10);
        document.getElementById('progress-text').innerText = `Câu ${displayNum} / 30`;
        document.getElementById('progress-fill').style.width = `${(currentStep / questions.length) * 100}%`;

        startTimer(data.time);

        if (data.type === 'choice') {
            area.innerHTML = `<h3>${data.q}</h3><div id="grid" style="display:grid;grid-template-columns:1fr 1fr;gap:10px;"></div>`;
            data.options.forEach(opt => {
                const b = document.createElement('div');
                b.className = "match-item"; b.innerText = opt; b.style.cursor="pointer";
                b.onclick = () => {
                    clearInterval(timerInterval);
                    const isCorrect = (opt === data.correct);
                    if(isCorrect) score++;
                    triggerFeedback(isCorrect);
                    nextBtn.classList.remove('hidden');
                    document.getElementById('grid').style.pointerEvents = "none";
                };
                document.getElementById('grid').appendChild(b);
            });
        } else if (data.type === 'matching') {
            area.innerHTML = `<h3>Kéo tiếng Anh khớp với tiếng Việt (120s)</h3><div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;"><div id="en-l"></div><div id="vi-l"></div></div>`;
            const shuffledEn = [...data.pairs].sort(() => Math.random() - 0.5);
            const shuffledVi = [...data.pairs].sort(() => Math.random() - 0.5);
            shuffledEn.forEach(p => document.getElementById('en-l').innerHTML += `<div class="match-item" data-id="${p.en}">${p.en}</div>`);
            shuffledVi.forEach(p => document.getElementById('vi-l').innerHTML += `<div class="match-item" style="background:#f9f9f9" data-target="${p.en}">${p.vi}</div>`);
            new Sortable(document.getElementById('en-l'), { animation: 150 });
            nextBtn.classList.remove('hidden');
            nextBtn.onclick = () => {
                clearInterval(timerInterval);
                let mScore = 0;
                const items = document.getElementById('en-l').querySelectorAll('.match-item');
                const targets = document.getElementById('vi-l').querySelectorAll('.match-item');
                items.forEach((item, i) => { if(item.dataset.id === targets[i].dataset.target) mScore++; });
                score += mScore;
                triggerFeedback(mScore > 5);
                handleNext();
            };
        } else if (data.type === 'order') {
            area.innerHTML = `<h3>Sắp xếp câu (40s):</h3><div id="sort-s" style="display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin:30px 0;"></div>`;
            [...data.words].sort(() => Math.random() - 0.5).forEach(w => document.getElementById('sort-s').innerHTML += `<div class="word-card">${w}</div>`);
            new Sortable(document.getElementById('sort-s'), { animation: 150 });
            nextBtn.classList.remove('hidden');
            nextBtn.onclick = () => {
                clearInterval(timerInterval);
                const res = Array.from(document.getElementById('sort-s').children).map(c => c.innerText).join(" ");
                const isCorrect = (res === data.sentence);
                if(isCorrect) score++;
                triggerFeedback(isCorrect);
                handleNext();
            };
        }
    }

    function handleNext(isTimeout = false) {
        if(isTimeout) triggerFeedback(false);
        currentStep++;
        if (currentStep < questions.length) showQuestion();
        else {
            clearInterval(timerInterval);
            document.getElementById('quiz-container').classList.add('hidden');
            document.getElementById('timer').classList.add('hidden');
            document.getElementById('result-slide').classList.remove('hidden');
            document.getElementById('congrats-text').innerText = `Kết quả của ${window.userName}`;
            document.getElementById('score-display').innerText = `${score}/30`;
        }
    }
</script>
</body>
</html>
